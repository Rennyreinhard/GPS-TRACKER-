<script>
const map = L.map('map').setView([-1.2921, 36.8219], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
  .addTo(map);

const vehicles = {};
let selectedVehicle = null;

// Smooth animation
function animateMarker(marker, start, end, duration = 2000) {
  const startTime = performance.now();

  function animate(time) {
    const t = Math.min((time - startTime) / duration, 1);

    const lat = start.lat + (end.lat - start.lat) * t;
    const lng = start.lng + (end.lng - start.lng) * t;

    marker.setLatLng([lat, lng]);

    if (t < 1) requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);
}

function updateVehicle(v) {
  const id = v.vehicle_id;
  const newPos = { lat: v.latitude, lng: v.longitude };

  if (!vehicles[id]) {
    const marker = L.marker([newPos.lat, newPos.lng]).addTo(map);

    vehicles[id] = {
      marker: marker,
      lastPos: newPos
    };

    addToSidebar(id);
    return;
  }

  const vehicle = vehicles[id];

  animateMarker(vehicle.marker, vehicle.lastPos, newPos);

  vehicle.lastPos = newPos;
}

function addToSidebar(id) {
  const list = document.getElementById("vehicleList");
  if (!list) return;

  const div = document.createElement("div");
  div.className = "vehicle";
  div.innerText = id;

  div.onclick = () => {
    selectedVehicle = id;
    const v = vehicles[id];
    map.setView([v.lastPos.lat, v.lastPos.lng], 15);
  };

  list.appendChild(div);
}

// 🔥 IMPORTANT: use full Render URL
async function fetchVehicles() {
  try {
    const res = await fetch("https://gps-tracker-3.onrender.com/vehicles");
    const data = await res.json();

    if (data.length === 0) {
      console.log("No vehicles yet...");
      return;
    }

    data.forEach(updateVehicle);

  } catch (err) {
    console.error("Error fetching vehicles:", err);
  }
}

// 🔁 live updates
setInterval(fetchVehicles, 3000);
fetchVehicles();
</script>
